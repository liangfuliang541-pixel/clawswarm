<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawSwarm — 龙虾集群控制台</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   ClawSwarm Dashboard v3.0 — Feature-Rich Console
   ═══════════════════════════════════════════════════════════════ */

:root {
  --bg-primary: #09090b; --bg-secondary: #0c0c0f; --bg-elevated: #131316;
  --bg-surface: #18181b; --bg-surface-2: #1f1f23; --bg-surface-3: #27272a;
  --border-subtle: #27272a; --border-default: #3f3f46; --border-hover: #52525b;
  --text-primary: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
  --status-success: #10b981; --status-warning: #f59e0b; --status-error: #ef4444;
  --status-info: #3b82f6; --status-processing: #8b5cf6;
  --gradient-brand: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; min-height: 100vh; overflow: hidden; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 999px; }

/* ═══════════════════════════════════════════════════════════════
   顶部导航
   ═══════════════════════════════════════════════════════════════ */
.top-nav { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: rgba(9,9,11,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; padding: 0 20px; z-index: 1000; gap: 16px; }
.nav-brand { display: flex; align-items: center; gap: 12px; }
.nav-logo { width: 32px; height: 32px; background: var(--gradient-brand); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px rgba(59,130,246,0.3); }
.nav-title { font-size: 15px; font-weight: 600; letter-spacing: -0.025em; }
.nav-divider { width: 1px; height: 24px; background: var(--border-subtle); }
.nav-cluster { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 999px; font-size: 12px; color: var(--text-secondary); }
.cluster-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--status-success); box-shadow: 0 0 8px var(--status-success); animation: pulse 2s ease-in-out infinite; }
.cluster-dot.offline { background: var(--status-error); box-shadow: 0 0 8px var(--status-error); }
.cluster-dot.demo { background: var(--status-processing); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

.nav-search { flex: 1; max-width: 400px; margin: 0 16px; }
.search-box { width: 100%; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 8px 14px; color: var(--text-primary); font-size: 13px; display: flex; align-items: center; gap: 8px; }
.search-box input { flex: 1; background: transparent; border: none; color: inherit; font-size: inherit; outline: none; }
.search-box input::placeholder { color: var(--text-muted); }

.nav-actions { display: flex; gap: 8px; margin-left: auto; }
.btn-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-secondary); cursor: pointer; transition: all 150ms; }
.btn-icon:hover { background: var(--bg-surface-2); border-color: var(--border-default); color: var(--text-primary); }

/* ═══════════════════════════════════════════════════════════════
   主布局
   ═══════════════════════════════════════════════════════════════ */
.main-layout { display: grid; grid-template-columns: 280px 1fr 340px; height: calc(100vh - 56px); margin-top: 56px; }

/* ═══════════════════════════════════════════════════════════════
   左侧边栏
   ═══════════════════════════════════════════════════════════════ */
.sidebar-left { background: var(--bg-secondary); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; }
.sidebar-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
.sidebar-count { font-size: 11px; color: var(--text-muted); background: var(--bg-surface); padding: 2px 8px; border-radius: 999px; }

.node-filters { padding: 12px; border-bottom: 1px solid var(--border-subtle); display: flex; gap: 8px; }
.filter-chip { padding: 4px 10px; background: transparent; border: 1px solid var(--border-subtle); border-radius: 999px; font-size: 11px; color: var(--text-muted); cursor: pointer; transition: all 150ms; }
.filter-chip:hover, .filter-chip.active { background: var(--bg-surface-2); border-color: var(--border-default); color: var(--text-primary); }

.sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }

.node-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 150ms; position: relative; }
.node-card:hover { border-color: var(--border-default); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.node-card.selected { border-color: var(--status-info); background: var(--bg-surface-2); }
.node-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gradient-brand); opacity: 0; transition: opacity 150ms; }
.node-card:hover::before { opacity: 1; }

.node-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.node-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #1e3a5f 0%, #3b82f6 100%); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.node-name { flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-status-badge { font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; }
.status-online { background: rgba(16,185,129,0.15); color: var(--status-success); }
.status-offline { background: rgba(239,68,68,0.15); color: var(--status-error); }
.status-busy { background: rgba(245,158,11,0.15); color: var(--status-warning); }
.status-idle { background: rgba(59,130,246,0.15); color: var(--status-info); }

.node-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.node-stat { display: flex; flex-direction: column; gap: 2px; }
.node-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
.node-stat-value { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
.progress-bar { height: 3px; background: var(--bg-surface-3); border-radius: 999px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; background: var(--gradient-brand); border-radius: 999px; transition: width 300ms; }
.node-capabilities { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.cap-tag { font-size: 9px; padding: 2px 6px; background: var(--bg-surface-2); border: 1px solid var(--border-subtle); border-radius: 4px; color: var(--text-muted); }

/* ═══════════════════════════════════════════════════════════════
   中央主区域
   ═══════════════════════════════════════════════════════════════ */
.main-content { background: var(--bg-primary); overflow-y: auto; padding: 20px; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; position: relative; overflow: hidden; transition: all 150ms; }
.stat-card:hover { border-color: var(--border-default); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.stat-icon { width: 40px; height: 40px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 20px; }
.stat-card.blue .stat-icon { background: rgba(59,130,246,0.15); color: var(--status-info); }
.stat-card.green .stat-icon { background: rgba(16,185,129,0.15); color: var(--status-success); }
.stat-card.yellow .stat-icon { background: rgba(245,158,11,0.15); color: var(--status-warning); }
.stat-card.purple .stat-icon { background: rgba(139,92,246,0.15); color: var(--status-processing); }
.stat-value { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.stat-card.blue .stat-value { color: var(--status-info); }
.stat-card.green .stat-value { color: var(--status-success); }
.stat-card.yellow .stat-value { color: var(--status-warning); }
.stat-card.purple .stat-value { color: var(--status-processing); }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }

/* 任务提交 */
.task-submit-section { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 20px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.task-form { display: flex; flex-direction: column; gap: 12px; }
.task-textarea { width: 100%; min-height: 100px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 14px 16px; color: var(--text-primary); font-size: 13px; line-height: 1.6; resize: vertical; transition: all 150ms; font-family: inherit; }
.task-textarea:focus { outline: none; border-color: var(--status-info); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.task-options { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.task-type-select { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 8px 12px; color: var(--text-primary); font-size: 12px; cursor: pointer; }
.btn-primary { background: var(--gradient-brand); border: none; border-radius: var(--radius-lg); padding: 10px 20px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 150ms; display: flex; align-items: center; gap: 8px; margin-left: auto; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.4); }

/* DAG */
.dag-section { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 20px; margin-bottom: 20px; min-height: 280px; }
.dag-container { position: relative; min-height: 200px; overflow: auto; }
.dag-canvas { position: relative; min-width: 100%; min-height: 180px; }
.dag-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.dag-node { position: absolute; background: var(--bg-surface); border: 2px solid var(--border-default); border-radius: var(--radius-lg); padding: 12px 16px; min-width: 140px; cursor: pointer; transition: all 150ms; z-index: 10; }
.dag-node:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.dag-node.pending { border-color: var(--status-warning); }
.dag-node.running { border-color: var(--status-info); box-shadow: 0 0 16px rgba(59,130,246,0.3); animation: node-pulse 1.5s ease-in-out infinite; }
.dag-node.success { border-color: var(--status-success); }
.dag-node.failed { border-color: var(--status-error); }
@keyframes node-pulse { 0%, 100% { box-shadow: 0 0 16px rgba(59,130,246,0.3); } 50% { box-shadow: 0 0 24px rgba(59,130,246,0.5); } }
.dag-node-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.dag-spinner { width: 10px; height: 10px; border: 2px solid var(--status-info); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.dag-edge { stroke: var(--border-default); stroke-width: 2; fill: none; }
.dag-edge.active { stroke: var(--status-info); stroke-dasharray: 5 3; animation: dash 1s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -8; } }

/* ═══════════════════════════════════════════════════════════════
   右侧边栏
   ═══════════════════════════════════════════════════════════════ */
.sidebar-right { background: var(--bg-secondary); border-left: 1px solid var(--border-subtle); display: flex; flex-direction: column; overflow: hidden; }
.right-header { padding: 16px; border-bottom: 1px solid var(--border-subtle); }
.tabs { display: flex; background: var(--bg-surface); border-radius: var(--radius-lg); padding: 4px; }
.tab-btn { flex: 1; padding: 8px 12px; background: transparent; border: none; border-radius: var(--radius-md); color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 150ms; }
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active { background: var(--bg-surface-2); color: var(--text-primary); }

.right-toolbar { padding: 12px; border-bottom: 1px solid var(--border-subtle); display: flex; gap: 8px; }
.toolbar-btn { padding: 6px 12px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); font-size: 11px; color: var(--text-secondary); cursor: pointer; transition: all 150ms; }
.toolbar-btn:hover, .toolbar-btn.active { background: var(--bg-surface-2); border-color: var(--border-default); color: var(--text-primary); }

.right-content { flex: 1; overflow-y: auto; padding: 12px; }

.task-item { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 150ms; }
.task-item:hover { border-color: var(--border-default); transform: translateX(4px); }
.task-item.selected { border-color: var(--status-info); }
.task-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.task-id { font-size: 11px; color: var(--text-muted); font-family: monospace; }
.task-status { font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; }
.task-item.pending .task-status { background: rgba(245,158,11,0.15); color: var(--status-warning); }
.task-item.running .task-status { background: rgba(59,130,246,0.15); color: var(--status-info); }
.task-item.success .task-status { background: rgba(16,185,129,0.15); color: var(--status-success); }
.task-item.failed .task-status { background: rgba(239,68,68,0.15); color: var(--status-error); }
.task-prompt { font-size: 12px; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.task-meta { display: flex; align-items: center; gap: 12px; margin-top: 8px; font-size: 10px; color: var(--text-muted); }

.event-item { padding: 10px 12px; border-bottom: 1px solid var(--border-subtle); font-size: 12px; display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.event-time { color: var(--text-muted); font-variant-numeric: tabular-nums; font-size: 11px; flex-shrink: 0; }
.event-type { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.event-item.task_created .event-type { background: var(--status-warning); }
.event-item.task_started .event-type { background: var(--status-info); }
.event-item.task_completed .event-type { background: var(--status-success); }
.event-item.error .event-type { background: var(--status-error); }
.event-content { flex: 1; color: var(--text-secondary); }

/* ═══════════════════════════════════════════════════════════════
   Modal 弹窗
   ═══════════════════════════════════════════════════════════════ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 200ms; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); width: 90%; max-width: 800px; max-height: 90vh; display: flex; flex-direction: column; transform: scale(0.95); transition: transform 200ms; }
.modal-overlay.active .modal { transform: scale(1); }
.modal-header { padding: 20px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; border-radius: var(--radius-md); }
.modal-close:hover { background: var(--bg-surface); color: var(--text-primary); }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--border-subtle); display: flex; justify-content: flex-end; gap: 12px; }

/* 任务详情 */
.task-detail-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.detail-item { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 12px; }
.detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.detail-value { font-size: 13px; font-weight: 600; }
.task-output { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 16px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; overflow-x: auto; max-height: 400px; overflow-y: auto; }

/* 终端 Modal */
.terminal { background: #0d0d0f; border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
.terminal-header { padding: 12px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; gap: 8px; }
.terminal-dot { width: 12px; height: 12px; border-radius: 50%; }
.terminal-dot.red { background: #ff5f56; }
.terminal-dot.yellow { background: #ffbd2e; }
.terminal-dot.green { background: #27c93f; }
.terminal-title { font-size: 12px; color: var(--text-secondary); flex: 1; }
.terminal-body { padding: 16px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; min-height: 300px; max-height: 400px; overflow-y: auto; }
.terminal-line { margin-bottom: 4px; }
.terminal-line.prompt { color: var(--status-success); }
.terminal-line.output { color: var(--text-secondary); }
.terminal-line.error { color: var(--status-error); }
.terminal-input-line { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.terminal-prompt { color: var(--status-success); }
.terminal-input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-family: inherit; font-size: inherit; outline: none; }

/* ═══════════════════════════════════════════════════════════════
   设置面板
   ═══════════════════════════════════════════════════════════════ */
.settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.setting-group { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 16px; }
.setting-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.setting-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
.setting-item:last-child { border-bottom: none; }
.setting-label { font-size: 12px; color: var(--text-secondary); }
.toggle { width: 44px; height: 24px; background: var(--bg-surface-3); border-radius: 999px; position: relative; cursor: pointer; transition: background 200ms; }
.toggle.active { background: var(--status-success); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 200ms; }
.toggle.active::after { transform: translateX(20px); }

/* ═══════════════════════════════════════════════════════════════
   Toast & 连接指示器
   ═══════════════════════════════════════════════════════════════ */
.toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.toast.success .toast-icon { color: var(--status-success); }
.toast.error .toast-icon { color: var(--status-error); }
.toast.info .toast-icon { color: var(--status-info); }

.conn-indicator { position: fixed; bottom: 20px; right: 20px; width: 12px; height: 12px; border-radius: 50%; background: var(--status-error); box-shadow: 0 0 12px var(--status-error); z-index: 1000; transition: all 200ms; }
.conn-indicator.connected { background: var(--status-success); box-shadow: 0 0 12px var(--status-success); }

/* ═══════════════════════════════════════════════════════════════
   空状态
   ═══════════════════════════════════════════════════════════════ */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
.empty-desc { font-size: 12px; }

/* ═══════════════════════════════════════════════════════════════
   响应式
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 1200px) { .main-layout { grid-template-columns: 240px 1fr 300px; } }
@media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } .sidebar-left, .sidebar-right { display: none; } }
</style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="top-nav">
  <div class="nav-brand">
    <div class="nav-logo">🦞</div>
    <div class="nav-title">ClawSwarm</div>
    <div class="nav-divider"></div>
    <div class="nav-cluster">
      <span class="cluster-dot" id="clusterDot"></span>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ClawSwarm Dashboard v3.0 — 核心逻辑
   ═══════════════════════════════════════════════════════════════ */

let ws = null, tasks = [], nodes = [], events = [], logs = [];
let reconnectTimer = null, selectedNode = null, currentTab = 'tasks';
let taskFilter = 'all', nodeFilter = 'all', searchQuery = '';
let currentTaskDetail = null, currentTerminalNode = null;

const WS_URL = `ws://${location.host}/ws`;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('connIndicator').classList.add('connected');
    document.getElementById('settingWsStatus').textContent = '已连接';
    showToast('success', '已连接到集群');
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };
  ws.onclose = () => {
    document.getElementById('connIndicator').classList.remove('connected');
    document.getElementById('settingWsStatus').textContent = '已断开';
    showToast('warning', '连接断开，正在重连...');
    reconnectTimer = setTimeout(connect, 3000);
  };
  ws.onerror = (e) => console.error('WebSocket error:', e);
  ws.onmessage = (e) => {
    try { handleMessage(JSON.parse(e.data)); } catch (err) { console.warn('Bad message:', err); }
  };
}

function handleMessage(msg) {
  const handlers = {
    'init': () => {
      const d = msg.data;
      if (d.nodes) renderNodes(d.nodes.list || []);
      if (d.tasks) { tasks = d.tasks; renderTasks(); renderDAG(); }
      if (d.events) { events = d.events; renderEvents(); }
      if (d.swarm) updateClusterStatus(d.swarm);
      updateStats();
    },
    'task_created': () => {
      tasks.push(msg.task);
      renderTasks(); renderDAG(); updateStats();
      showToast('info', `任务 ${msg.task_id} 已创建`);
      addEvent('task_created', `任务 ${msg.task_id} 已提交`);
    },
    'task_started': () => {
      const t = tasks.find(t => t.id === msg.task_id);
      if (t) { t.status = 'running'; renderTasks(); renderDAG(); }
      updateStats();
      addEvent('task_started', `任务 ${msg.task_id} 开始执行`);
      if (currentTaskDetail === msg.task_id) loadTaskDetail(msg.task_id);
    },
    'task_completed': () => {
      const t = tasks.find(t => t.id === msg.task_id);
      if (t) { Object.assign(t, msg.result); renderTasks(); renderDAG(); }
      updateStats();
      const status = msg.result?.status || 'done';
      showToast(status === 'success' ? 'success' : 'error', `任务 ${msg.task_id} ${status === 'success' ? '完成' : '失败'}`);
      addEvent('task_completed', `任务 ${msg.task_id} 完成: ${status}`);
      if (currentTaskDetail === msg.task_id) loadTaskDetail(msg.task_id);
    },
    'task_update': () => {
      addLog(`[${msg.task_id}] ${msg.status}: ${msg.description || ''}`);
    },
    'node_status_change': () => {
      addEvent('node_status_change', `节点 ${msg.node_id}: ${msg.old} → ${msg.new}`);
      fetchNodes();
    },
    'ping': () => {}, 'pong': () => {}, 'heartbeat': () => {},
  };
  const handler = handlers[msg.type];
  if (handler) handler();
  else if (msg.data?.monitor) { renderNodes(msg.data.monitor.nodes?.list || []); updateStats(); }
}

async function fetchNodes() {
  try {
    const res = await fetch('/api/nodes');
    const data = await res.json();
    renderNodes(data.list || []);
    updateStats();
  } catch (e) { console.error('Fetch nodes failed:', e); }
}

function renderNodes(nodeList) {
  nodes = nodeList;
  const filtered = nodes.filter(n => {
    if (nodeFilter === 'online') return n.status === 'online';
    if (nodeFilter === 'offline') return n.status === 'offline';
    return true;
  });
  document.getElementById('nodeCount').textContent = filtered.length;
  const el = document.getElementById('nodeList');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🦞</div><div class="empty-title">暂无节点</div><div class="empty-desc">节点将自动显示在这里</div></div>`;
    return;
  }
  el.innerHTML = filtered.map(n => `
    <div class="node-card ${selectedNode === n.node_id ? 'selected' : ''}" onclick="selectNode('${n.node_id}')" ondblclick="openTerminal('${n.node_id}')">
      <div class="node-header">
        <div class="node-avatar">🦞</div>
        <div class="node-name">${escapeHtml(n.node_id)}</div>
        <span class="node-status-badge status-${n.status || 'offline'}">${n.status || 'offline'}</span>
      </div>
      <div class="node-meta">
        <div class="node-stat">
          <span class="node-stat-label">CPU</span>
          <span class="node-stat-value">${n.cpu ? n.cpu.toFixed(1) + '%' : '--'}</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(n.cpu || 0, 100)}%"></div></div>
        </div>
        <div class="node-stat">
          <span class="node-stat-label">MEM</span>
          <span class="node-stat-value">${n.memory ? n.memory.toFixed(1) + '%' : '--'}</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(n.memory || 0, 100)}%"></div></div>
        </div>
      </div>
      <div class="node-capabilities">${(n.capabilities || []).slice(0, 4).map(c => `<span class="cap-tag">${c}</span>`).join('')}</div>
    </div>
  `).join('');
}

function selectNode(nodeId) {
  selectedNode = selectedNode === nodeId ? null : nodeId;
  renderNodes(nodes);
}

function filterNodes(filter) {
  nodeFilter = filter;
  document.querySelectorAll('.node-filters .filter-chip').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderNodes(nodes);
}

function renderTasks() {
  const el = document.getElementById('taskList');
  let filtered = tasks;
  if (taskFilter !== 'all') filtered = filtered.filter(t => (t.status || 'pending') === taskFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(t => (t.id + (t.prompt || t.description || '')).toLowerCase().includes(q));
  }
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">暂无任务</div></div>`;
    return;
  }
  el.innerHTML = filtered.slice().reverse().map(t => `
    <div class="task-item ${t.status || 'pending'} ${currentTaskDetail === t.id ? 'selected' : ''}" onclick="openTaskDetail('${t.id}')">
      <div class="task-item-header">
        <span class="task-id">#${t.id}</span>
        <span class="task-status">${t.status || 'pending'}</span>
      </div>
      <div class="task-prompt">${escapeHtml(t.prompt || t.description || '')}</div>
      <div class="task-meta">
        <span>${t.created_at ? formatTime(t.created_at) : '--'}</span>
        ${t.mode ? `<span>${t.mode}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function filterTasks(filter) {
  taskFilter = filter;
  document.querySelectorAll('#taskToolbar .toolbar-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderTasks();
}

function handleSearch(query) {
  searchQuery = query;
  renderTasks();
  renderEvents();
}

function renderDAG() {
  const canvas = document.getElementById('dagCanvas');
  const svg = document.getElementById('dagSvg');
  if (!tasks.length) {
    canvas.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">暂无任务</div></div>`;
    svg.innerHTML = '';
    return;
  }
  const W = 160, H = 70, GAP_X = 90, GAP_Y = 100;
  const cols = Math.ceil(Math.sqrt(Math.max(tasks.length, 1)));
  const startX = 30, startY = 20;
  canvas.innerHTML = tasks.map((task, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = startX + col * (W + GAP_X), y = startY + row * (H + GAP_Y);
    const status = task.status || 'pending';
    return `
      <div class="dag-node ${status}" id="dag-${task.id}" style="left:${x}px;top:${y}px;width:${W}px;" onclick="openTaskDetail('${task.id}')">
        <div class="dag-node-header">${status === 'running' ? '<div class="dag-spinner"></div>' : '<div style="width:10px;height:10px;border-radius:50%;background:var(--status-' + (status === 'success' ? 'success' : status === 'failed' ? 'error' : 'warning') + ');"></div>'}<div style="font-size:12px;font-weight:600;">${status.toUpperCase()}</div></div>
        <div style="font-size:10px;color:var(--text-muted);">#${task.id}</div>
      </div>
    `;
  }).join('');
  const svgLines = [];
  for (let i = 1; i < tasks.length; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const prevCol = (i - 1) % cols, prevRow = Math.floor((i - 1) / cols);
    const x1 = startX + prevCol * (W + GAP_X) + W / 2, y1 = startY + prevRow * (H + GAP_Y) + H;
    const x2 = startX + col * (W + GAP_X) + W / 2, y2 = startY + row * (H + GAP_Y);
    svgLines.push(`<path class="dag-edge ${tasks[i-1].status === 'success' ? 'active' : ''}" d="M${x1},${y1} C${x1},${y1+30} ${x2},${y2-30} ${x2},${y2}"/>`);
  }
  svg.innerHTML = svgLines.join('');
}

function renderEvents() {
  const el = document.getElementById('eventList');
  let filtered = events;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(e => (e.msg || e.type || '').toLowerCase().includes(q));
  }
  if (!filtered.length) { el.innerHTML = ''; return; }
  el.innerHTML = filtered.slice(-50).reverse().map(e => `
    <div class="event-item ${e.type}">
      <span class="event-time">${formatTime(e.timestamp)}</span>
      <span class="event-type"></span>
      <div class="event-content">${escapeHtml(e.msg || e.type)}</div>
    </div>
  `).join('');
}

function addEvent(type, msg) {
  events.push({ type, msg, timestamp: new Date().toISOString() });
  if (events.length > 200) events = events.slice(-150);
  renderEvents();
}

function addLog(msg) {
  logs.push({ msg, time: new Date().toISOString() });
  if (logs.length > 500) logs = logs.slice(-400);
  renderLogs();
}

function renderLogs() {
  const el = document.getElementById('logList');
  if (currentTab !== 'logs') return;
  let filtered = logs;
  if (searchQuery) filtered = filtered.filter(l => l.msg.toLowerCase().includes(searchQuery.toLowerCase()));
  el.innerHTML = filtered.slice(-100).map(l => `
    <div class="event-item">
      <span class="event-time">${formatTime(l.time)}</span>
      <div class="event-content" style="font-family:monospace;font-size:11px;">${escapeHtml(l.msg)}</div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

async function openTaskDetail(taskId) {
  currentTaskDetail = taskId;
  renderTasks();
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  document.getElementById('detailTaskId').textContent = t.id;
  document.getElementById('detailTaskStatus').textContent = t.status || 'pending';
  document.getElementById('detailTaskType').textContent = t.mode || 'spawn';
  document.getElementById('detailTaskPrompt').textContent = t.prompt || t.description || '--';
  document.getElementById('detailTaskOutput').textContent = t.output || t.result || '等待执行...';
  document.getElementById('taskModal').classList.add('active');
  await loadTaskDetail(taskId);
}

async function loadTaskDetail(taskId) {
  try {
    const res = await fetch(`/api/tasks/${taskId}`);
    if (!res.ok) return;
    const t = await res.json();
    document.getElementById('detailTaskStatus').textContent = t.status || 'pending';
    document.getElementById('detailTaskOutput').textContent = t.output || t.result || '等待执行...';
  } catch (e) { console.error('Load task detail failed:', e); }
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); if (id === 'taskModal') currentTaskDetail = null; }

function copyTaskOutput() {
  const text = document.getElementById('detailTaskOutput').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('success', '已复制到剪贴板'));
}

function rerunTask() {
  if (!currentTaskDetail) return;
  const t = tasks.find(x => x.id === currentTaskDetail);
  if (t) {
    document.getElementById('taskPrompt').value = t.prompt || t.description || '';
    document.getElementById('taskType').value = t.mode || 'spawn';
    closeModal('taskModal');
    showToast('info', '任务内容已填充到提交表单');
  }
}

function openTerminal(nodeId) {
  currentTerminalNode = nodeId;
  document.getElementById('terminalTitle').textContent = nodeId;
  document.getElementById('terminalBody').innerHTML = `<div class="terminal-line prompt">$ 已连接到 ${nodeId}</div><div class="terminal-line output">输入命令开始...</div>`;
  document.getElementById('terminalModal').classList.add('active');
  setTimeout(() => document.getElementById('terminalInput').focus(), 100);
}

async function handleTerminalKey(e) {
  if (e.key !== 'Enter') return;
  const input = document.getElementById('terminalInput');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  const body = document.getElementById('terminalBody');
  body.innerHTML += `<div class="terminal-line prompt">$ ${escapeHtml(cmd)}</div>`;
  body.scrollTop = body.scrollHeight;
  if (!currentTerminalNode) {
    body.innerHTML += `<div class="terminal-line error">错误: 未选择节点</div>`;
    return;
  }
  try {
    const res = await fetch(`/api/cmd/${currentTerminalNode}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd, timeout: 60 })
    });
    const data = await res.json();
    const output = data.output || data.result || JSON.stringify(data, null, 2);
    body.innerHTML += `<div class="terminal-line output">${escapeHtml(output)}</div>`;
  } catch (err) {
    body.innerHTML += `<div class="terminal-line error">错误: ${escapeHtml(err.message)}</div>`;
  }
  body.scrollTop = body.scrollHeight;
}

function openSettings() {
  document.getElementById('settingRelayUrl').textContent = location.host;
  document.getElementById('settingsModal').classList.add('active');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('taskList').style.display = tab === 'tasks' ? 'block' : 'none';
  document.getElementById('eventList').style.display = tab === 'events' ? 'block' : 'none';
  document.getElementById('logList').style.display = tab === 'logs' ? 'block' : 'none';
  document.getElementById('taskToolbar').style.display = tab === 'tasks' ? 'flex' : 'none';
  if (tab === 'logs') renderLogs();
}

async function submitTask(e) {
  e.preventDefault();
  const prompt = document.getElementById('taskPrompt').value.trim();
  const type = document.getElementById('taskType').value;
  if (!prompt) return;
  document.getElementById('taskPrompt').value = '';
  try {
    const res = await fetch('/api/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, mode: type })
    });
    const data = await res.json();
    showToast('info', `任务 ${data.task_id} 已提交`);
  } catch (err) { showToast('error', '提交失败: ' + err.message); }
}

function updateStats() {
  animateValue('statNodes', nodes.length);
  animateValue('statOnline', nodes.filter(n => n.status === 'online').length);
  animateValue('statPending', tasks.filter(t => ['pending', 'running'].includes(t.status)).length);
  animateValue('statDone', tasks.filter(t => ['success', 'done'].includes(t.status)).length);
}

function updateClusterStatus(swarm) {
  const dot = document.getElementById('clusterDot');
  const badge = document.getElementById('clusterName');
  if (swarm.mode === 'demo') { dot.className = 'cluster-dot demo'; badge.textContent = 'Demo'; }
  else if (swarm.initialized) { dot.className = 'cluster-dot'; badge.textContent = 'Live'; }
  else { dot.className = 'cluster-dot offline'; badge.textContent = 'Offline'; }
}

function showToast(type, msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : type === 'error' ? '✕' : type === 'warning' ? '!' : 'ℹ'}</span><span>${escapeHtml(msg)}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
}

function refreshAll() {
  showToast('info', '正在刷新...');
  fetchNodes();
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
}

function formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--:--'; }
function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function animateValue(id, target) {
  const el = document.getElementById(id), current = parseInt(el.textContent) || 0, diff = target - current;
  if (!diff) return;
  const steps = 10, increment = diff / steps;
  let step = 0;
  const animate = () => { step++; el.textContent = Math.round(current + increment * step); if (step < steps) requestAnimationFrame(animate); else el.textContent = target; };
  requestAnimationFrame(animate);
}

// 初始化
connect();
fetchNodes();
setInterval(() => document.querySelector('.nav-search input').placeholder = `搜索... (${tasks.length} 任务, ${nodes.length} 节点)`, 30000);
</script>
