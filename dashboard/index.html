<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawSwarm — 龙虾集群控制台</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   ClawSwarm Dashboard v2.0 — Modern Dark Theme
   Inspired by Linear, Vercel, and Grafana
   ═══════════════════════════════════════════════════════════════ */

:root {
  /* ── 色彩系统 ─────────────────────────────────────────────── */
  --bg-primary:     #09090b;
  --bg-secondary:   #0c0c0f;
  --bg-elevated:    #131316;
  --bg-surface:      #18181b;
  --bg-surface-2:    #1f1f23;
  --bg-surface-3:   #27272a;

  --border-subtle:  #27272a;
  --border-default: #3f3f46;
  --border-hover:   #52525b;

  --text-primary:   #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted:     #71717a;
  --text-disabled:  #52525b;

  /* 状态色 */
  --status-success:     #10b981;
  --status-warning:     #f59e0b;
  --status-error:       #ef4444;
  --status-info:        #3b82f6;
  --status-processing:  #8b5cf6;

  /* 品牌渐变 */
  --gradient-brand: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
  --gradient-subtle: linear-gradient(135deg, rgba(59,130,246,0.15) 0%, rgba(139,92,246,0.15) 100%);
  --gradient-glow:  radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.2) 0%, transparent 70%);

  /* ── 尺寸与圆角 ───────────────────────────────────────────── */
  --radius-xs:   4px;
  --radius-sm:   6px;
  --radius-md:   8px;
  --radius-lg:  12px;
  --radius-xl:  16px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* ── 阴影 ─────────────────────────────────────────────────── */
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.5);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg:    0 8px 24px rgba(0,0,0,0.4);
  --shadow-glow:  0 0 20px rgba(59,130,246,0.3);

  /* ── 动画 ─────────────────────────────────────────────────── */
  --transition-fast:   150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow:   300ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ═══════════════════════════════════════════════════════════════
   基础重置与全局样式
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
  line-height: 1.5;
  min-height: 100vh;
  overflow: hidden;
}

/* 自定义滚动条 */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: var(--radius-full); }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* ═══════════════════════════════════════════════════════════════
   顶层导航栏
   ═══════════════════════════════════════════════════════════════ */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 56px;
  background: rgba(9, 9, 11, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
  gap: 16px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.nav-logo {
  width: 32px;
  height: 32px;
  background: var(--gradient-brand);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: var(--shadow-glow);
}

.nav-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.025em;
}

.nav-divider {
  width: 1px;
  height: 24px;
  background: var(--border-subtle);
  margin: 0 8px;
}

.nav-cluster {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  font-size: 12px;
  color: var(--text-secondary);
}

.cluster-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--status-success);
  box-shadow: 0 0 8px var(--status-success);
  animation: pulse 2s ease-in-out infinite;
}

.cluster-dot.offline { background: var(--status-error); box-shadow: 0 0 8px var(--status-error); }
.cluster-dot.demo { background: var(--status-processing); box-shadow: 0 0 8px var(--status-processing); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.1); }
}

.nav-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}

.nav-time {
  font-size: 12px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.nav-actions {
  display: flex;
  gap: 8px;
}

.btn-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-icon:hover {
  background: var(--bg-surface-2);
  border-color: var(--border-default);
  color: var(--text-primary);
}

/* ═══════════════════════════════════════════════════════════════
   主布局
   ═══════════════════════════════════════════════════════════════ */
.main-layout {
  display: grid;
  grid-template-columns: 260px 1fr 320px;
  height: calc(100vh - 56px);
  margin-top: 56px;
}

/* ═══════════════════════════════════════════════════════════════
   左侧边栏 — 节点列表
   ═══════════════════════════════════════════════════════════════ */
.sidebar-left {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

.sidebar-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-surface);
  padding: 2px 8px;
  border-radius: var(--radius-full);
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* ── 节点卡片 ─────────────────────────────────────────────────── */
.node-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  overflow: hidden;
}

.node-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--gradient-brand);
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.node-card:hover {
  border-color: var(--border-default);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.node-card:hover::before { opacity: 1; }

.node-card.selected {
  border-color: var(--status-info);
  background: var(--bg-surface-2);
}

.node-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.node-avatar {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, #1e3a5f 0%, #3b82f6 100%);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.node-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.node-status-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: var(--radius-full);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.status-online { background: rgba(16,185,129,0.15); color: var(--status-success); }
.status-offline { background: rgba(239,68,68,0.15); color: var(--status-error); }
.status-busy { background: rgba(245,158,11,0.15); color: var(--status-warning); }
.status-idle { background: rgba(59,130,246,0.15); color: var(--status-info); }

.node-meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.node-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.node-stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.node-stat-value {
  font-size: 12px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* ── 进度条 ───────────────────────────────────────────────────── */
.progress-bar {
  height: 3px;
  background: var(--bg-surface-3);
  border-radius: var(--radius-full);
  overflow: hidden;
  margin-top: 4px;
}

.progress-fill {
  height: 100%;
  background: var(--gradient-brand);
  border-radius: var(--radius-full);
  transition: width var(--transition-slow);
}

/* ── 能力标签 ─────────────────────────────────────────────────── */
.node-capabilities {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 10px;
}

.cap-tag {
  font-size: 9px;
  padding: 2px 6px;
  background: var(--bg-surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════════════
   中央主区域
   ═══════════════════════════════════════════════════════════════ */
.main-content {
  background: var(--bg-primary);
  overflow-y: auto;
  padding: 20px;
  position: relative;
}

.main-content::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 200px;
  background: var(--gradient-glow);
  pointer-events: none;
}

/* ── 状态卡片组 ───────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
  position: relative;
}

.stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: all var(--transition-fast);
}

.stat-card:hover {
  border-color: var(--border-default);
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, currentColor 0%, transparent 70%);
  opacity: 0.05;
  transform: translate(20px, -20px);
}

.stat-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 20px;
}

.stat-card.blue .stat-icon { background: rgba(59,130,246,0.15); color: var(--status-info); }
.stat-card.green .stat-icon { background: rgba(16,185,129,0.15); color: var(--status-success); }
.stat-card.yellow .stat-icon { background: rgba(245,158,11,0.15); color: var(--status-warning); }
.stat-card.purple .stat-icon { background: rgba(139,92,246,0.15); color: var(--status-processing); }

.stat-value {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
}

.stat-card.blue .stat-value { color: var(--status-info); }
.stat-card.green .stat-value { color: var(--status-success); }
.stat-card.yellow .stat-value { color: var(--status-warning); }
.stat-card.purple .stat-value { color: var(--status-processing); }

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.stat-trend {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: var(--radius-full);
}

.stat-trend.up { background: rgba(16,185,129,0.15); color: var(--status-success); }
.stat-trend.down { background: rgba(239,68,68,0.15); color: var(--status-error); }

/* ── 任务提交区 ───────────────────────────────────────────────── */
.task-submit-section {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 20px;
  margin-bottom: 24px;
  position: relative;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title svg { color: var(--status-info); }

.task-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.task-textarea {
  width: 100%;
  min-height: 100px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
  transition: all var(--transition-fast);
  font-family: inherit;
}

.task-textarea::placeholder { color: var(--text-muted); }

.task-textarea:focus {
  outline: none;
  border-color: var(--status-info);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

.task-options {
  display: flex;
  align-items: center;
  gap: 12px;
}

.task-type-select {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 12px;
  cursor: pointer;
  min-width: 140px;
}

.btn-primary {
  background: var(--gradient-brand);
  border: none;
  border-radius: var(--radius-lg);
  padding: 10px 20px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(59,130,246,0.4);
}

.btn-primary:active { transform: translateY(0); }

/* ── DAG 可视化 ───────────────────────────────────────────────── */
.dag-section {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  padding: 20px;
  margin-bottom: 24px;
  min-height: 280px;
  position: relative;
}

.dag-container {
  position: relative;
  min-height: 200px;
  overflow: auto;
}

.dag-canvas {
  position: relative;
  min-width: 100%;
  min-height: 180px;
}

.dag-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.dag-node {
  position: absolute;
  background: var(--bg-surface);
  border: 2px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  min-width: 140px;
  cursor: pointer;
  transition: all var(--transition-fast);
  z-index: 10;
}

.dag-node:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.dag-node.pending { border-color: var(--status-warning); }
.dag-node.running { 
  border-color: var(--status-info); 
  box-shadow: 0 0 16px rgba(59,130,246,0.3);
  animation: node-pulse 1.5s ease-in-out infinite;
}
.dag-node.success { border-color: var(--status-success); }
.dag-node.failed { border-color: var(--status-error); }

@keyframes node-pulse {
  0%, 100% { box-shadow: 0 0 16px rgba(59,130,246,0.3); }
  50% { box-shadow: 0 0 24px rgba(59,130,246,0.5); }
}

.dag-node-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.dag-node-status {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.dag-node.pending .dag-node-status { background: var(--status-warning); }
.dag-node.running .dag-node-status { background: var(--status-info); animation: spin 1s linear infinite; }
.dag-node.success .dag-node-status { background: var(--status-success); }
.dag-node.failed .dag-node-status { background: var(--status-error); }

@keyframes spin { to { transform: rotate(360deg); } }

.dag-node-title {
  font-size: 12px;
  font-weight: 600;
}

.dag-node-id {
  font-size: 10px;
  color: var(--text-muted);
}

.dag-spinner {
  width: 10px;
  height: 10px;
  border: 2px solid var(--status-info);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* DAG 连线样式 */
.dag-edge {
  stroke: var(--border-default);
  stroke-width: 2;
  fill: none;
}

.dag-edge.active {
  stroke: var(--status-info);
  stroke-dasharray: 5 3;
  animation: dash 1s linear infinite;
}

@keyframes dash { to { stroke-dashoffset: -8; } }

.dag-arrow {
  fill: var(--border-default);
}

/* ═══════════════════════════════════════════════════════════════
   右侧边栏 — 任务与事件
   ═══════════════════════════════════════════════════════════════ */
.sidebar-right {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-subtle);
}

.tabs {
  display: flex;
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  padding: 4px;
}

.tab-btn {
  flex: 1;
  padding: 8px 12px;
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
  background: var(--bg-surface-2);
  color: var(--text-primary);
}

.right-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* ── 任务列表 ───────────────────────────────────────────────── */
.task-list { }

.task-item {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.task-item:hover {
  border-color: var(--border-default);
  transform: translateX(4px);
}

.task-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.task-id {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
}

.task-status {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: var(--radius-full);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.task-item.pending .task-status { background: rgba(245,158,11,0.15); color: var(--status-warning); }
.task-item.running .task-status { background: rgba(59,130,246,0.15); color: var(--status-info); }
.task-item.success .task-status { background: rgba(16,185,129,0.15); color: var(--status-success); }
.task-item.failed .task-status { background: rgba(239,68,68,0.15); color: var(--status-error); }

.task-prompt {
  font-size: 12px;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.5;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
  font-size: 10px;
  color: var(--text-muted);
}

.task-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── 事件流 ─────────────────────────────────────────────────── */
.event-list { }

.event-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12px;
  display: flex;
  gap: 10px;
  opacity: 0;
  animation: fadeIn 0.3s ease forwards;
}

@keyframes fadeIn { to { opacity: 1; } }

.event-time {
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  font-size: 11px;
  flex-shrink: 0;
}

.event-type {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}

.event-item.task_created .event-type { background: var(--status-warning); }
.event-item.task_started .event-type { background: var(--status-info); }
.event-item.task_completed .event-type { background: var(--status-success); }
.event-item.node_status_change .event-type { background: var(--status-processing); }
.event-item.error .event-type { background: var(--status-error); }

.event-content {
  flex: 1;
}

.event-msg {
  color: var(--text-secondary);
}

.event-item.task_created .event-msg { color: var(--status-warning); }
.event-item.task_completed .event-msg { color: var(--status-success); }
.event-item.task_started .event-msg { color: var(--status-info); }

/* ═══════════════════════════════════════════════════════════════
   空状态
   ═══════════════════════════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-secondary);
}

.empty-desc {
  font-size: 12px;
}

/* ═══════════════════════════════════════════════════════════════
   连接状态指示器
   ═══════════════════════════════════════════════════════════════ */
.conn-indicator {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--status-error);
  box-shadow: 0 0 12px var(--status-error);
  z-index: 1000;
  transition: all var(--transition-normal);
}

.conn-indicator.connected {
  background: var(--status-success);
  box-shadow: 0 0 12px var(--status-success);
}

.conn-tooltip {
  position: absolute;
  bottom: 20px;
  right: 26px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  opacity: 0;
  transform: translateX(4px);
  transition: all var(--transition-fast);
  pointer-events: none;
}

.conn-indicator:hover .conn-tooltip {
  opacity: 1;
  transform: translateX(0);
}

/* ═══════════════════════════════════════════════════════════════
   Toast 通知
   ═══════════════════════════════════════════════════════════════ */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  max-width: 400px;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.toast-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

.toast.success .toast-icon { background: rgba(16,185,129,0.2); color: var(--status-success); }
.toast.info .toast-icon { background: rgba(59,130,246,0.2); color: var(--status-info); }
.toast.warning .toast-icon { background: rgba(245,158,11,0.2); color: var(--status-warning); }
.toast.error .toast-icon { background: rgba(239,68,68,0.2); color: var(--status-error); }

.toast-msg {
  font-size: 13px;
  color: var(--text-primary);
  flex: 1;
}

.toast-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  font-size: 16px;
  line-height: 1;
}

.toast-close:hover { color: var(--text-primary); }

/* ═══════════════════════════════════════════════════════════════
   响应式适配
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 1200px) {
  .main-layout { grid-template-columns: 220px 1fr 280px; }
}

@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; }
  .sidebar-left, .sidebar-right { display: none; }
}

/* ═══════════════════════════════════════════════════════════════
   SVG 图标 (内联)
   ═══════════════════════════════════════════════════════════════ */
.icon {
  width: 1em;
  height: 1em;
  display: inline-block;
  vertical-align: middle;
}

.icon-16 { width: 16px; height: 16px; }
.icon-20 { width: 20px; height: 20px; }
</style>
</head>

<!-- 连接状态指示器 -->

  <div class="conn-tooltip">WebSocket 连接状态</div>
</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ClawSwarm Dashboard — 核心逻辑
   ═══════════════════════════════════════════════════════════════ */

// ── 状态 ─────────────────────────────────────────────────────
let ws = null;
let tasks = [];
let nodes = [];
let events = [];
let reconnectTimer = null;
let selectedNode = null;
let currentTab = 'tasks';

// ── WebSocket 连接 ───────────────────────────────────────────
const WS_URL = `ws://${location.host}/ws`;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('connIndicator').classList.add('connected');
    showToast('success', '已连接到集群');
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
  };

  ws.onclose = () => {
    document.getElementById('connIndicator').classList.remove('connected');
    showToast('warning', '连接断开，正在重连...');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = (e) => {
    document.getElementById('connIndicator').classList.remove('connected');
    console.error('WebSocket error:', e);
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch (err) {
      console.warn('Bad message:', err);
    }
  };
}

// ── 消息处理 ─────────────────────────────────────────────────
function handleMessage(msg) {
  const handlers = {
    'init': () => {
      const d = msg.data;
      if (d.nodes) renderNodes(d.nodes.list || []);
      if (d.tasks) { tasks = d.tasks; renderTasks(); renderDAG(); }
      if (d.events) { events = d.events; renderEvents(); }
      if (d.swarm) updateClusterStatus(d.swarm);
      updateStats();
    },
    'task_created': () => {
      tasks.push(msg.task);
      renderTasks();
      renderDAG();
      updateStats();
      showToast('info', `任务 ${msg.task_id} 已创建`);
      addEvent('task_created', `任务 ${msg.task_id} 已提交`);
    },
    'task_started': () => {
      const t = tasks.find(t => t.id === msg.task_id);
      if (t) { t.status = 'running'; renderTasks(); renderDAG(); }
      updateStats();
      addEvent('task_started', `任务 ${msg.task_id} 开始执行`);
    },
    'task_completed': () => {
      const t = tasks.find(t => t.id === msg.task_id);
      if (t) {
        Object.assign(t, msg.result);
        renderTasks();
        renderDAG();
      }
      updateStats();
      const status = msg.result?.status || 'done';
      showToast(status === 'success' ? 'success' : 'error',
                `任务 ${msg.task_id} ${status === 'success' ? '完成' : '失败'}`);
      addEvent('task_completed', `任务 ${msg.task_id} 完成: ${status}`);
    },
    'node_status_change': () => {
      addEvent('node_status_change', `节点 ${msg.node_id}: ${msg.old} → ${msg.new}`);
    },
    'ping': () => {},
    'pong': () => {},
    'heartbeat': () => {},
  };

  const handler = handlers[msg.type];
  if (handler) handler();
  else if (msg.data?.monitor) {
    renderNodes(msg.data.monitor.nodes?.list || []);
    updateStats();
  }
}

// ── 渲染：节点列表 ───────────────────────────────────────────
function renderNodes(nodeList) {
  nodes = nodeList;
  const el = document.getElementById('nodeList');
  const countEl = document.getElementById('nodeCount');
  countEl.textContent = nodes.length;

  if (!nodes.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🦞</div>
        <div class="empty-title">Demo 模式</div>
        <div class="empty-desc">启动节点后将自动显示</div>
      </div>
    `;
    return;
  }

  el.innerHTML = nodes.map(n => `
    <div class="node-card ${selectedNode === n.node_id ? 'selected' : ''}"
         onclick="selectNode('${n.node_id}')">
      <div class="node-header">
        <div class="node-avatar">🦞</div>
        <div class="node-name">${n.node_id}</div>
        <span class="node-status-badge status-${n.status || 'offline'}">
          ${n.status || 'offline'}
        </span>
      </div>
      <div class="node-meta">
        <div class="node-stat">
          <span class="node-stat-label">CPU</span>
          <span class="node-stat-value">${n.cpu ? n.cpu.toFixed(1) + '%' : '--'}</span>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${Math.min(n.cpu || 0, 100)}%"></div>
          </div>
        </div>
        <div class="node-stat">
          <span class="node-stat-label">MEM</span>
          <span class="node-stat-value">${n.memory ? n.memory.toFixed(1) + '%' : '--'}</span>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${Math.min(n.memory || 0, 100)}%"></div>
          </div>
        </div>
      </div>
      <div class="node-capabilities">
        ${(n.capabilities || []).slice(0, 4).map(c =>
          `<span class="cap-tag">${c}</span>`
        ).join('')}
      </div>
    </div>
  `).join('');
}

function selectNode(nodeId) {
  selectedNode = selectedNode === nodeId ? null : nodeId;
  renderNodes(nodes);
}

// ── 渲染：任务列表 ───────────────────────────────────────────
function renderTasks() {
  const el = document.getElementById('taskList');
  if (!tasks.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">暂无任务</div>
        <div class="empty-desc">提交任务后将显示在这里</div>
      </div>
    `;
    return;
  }

  el.innerHTML = tasks.slice().reverse().map(t => `
    <div class="task-item ${t.status || 'pending'}" onclick="focusTask('${t.id}')">
      <div class="task-item-header">
        <span class="task-id">#${t.id}</span>
        <span class="task-status">${t.status || 'pending'}</span>
      </div>
      <div class="task-prompt">${escapeHtml(t.prompt || t.description || '')}</div>
      <div class="task-meta">
        <span class="task-meta-item">
          <svg class="icon icon-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          ${t.created_at ? formatTime(t.created_at) : '--'}
        </span>
        ${t.mode ? `<span class="task-meta-item">${t.mode}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ── 渲染：DAG ─────────────────────────────────────────────────
function renderDAG() {
  const canvas = document.getElementById('dagCanvas');
  const svg = document.getElementById('dagSvg');

  if (!tasks.length) {
    canvas.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <div class="empty-title">暂无任务</div>
        <div class="empty-desc">提交任务后，执行流程将在这里可视化</div>
      </div>
    `;
    svg.innerHTML = '';
    return;
  }

  const W = 160, H = 70, GAP_X = 90, GAP_Y = 100;
  const cols = Math.ceil(Math.sqrt(Math.max(tasks.length, 1)));
  const startX = 30, startY = 20;

  // 渲染节点
  canvas.innerHTML = tasks.map((task, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = startX + col * (W + GAP_X);
    const y = startY + row * (H + GAP_Y);
    const status = task.status || 'pending';

    return `
      <div class="dag-node ${status}"
           id="dag-${task.id}"
           style="left:${x}px;top:${y}px;width:${W}px;"
           onclick="focusTask('${task.id}')">
        <div class="dag-node-header">
          ${status === 'running' ? '<div class="dag-spinner"></div>' : `<div class="dag-node-status"></div>`}
          <div class="dag-node-title">${status.toUpperCase()}</div>
        </div>
        <div class="dag-node-id">#${task.id}</div>
      </div>
    `;
  }).join('');

  // 渲染连线（SVG）
  const svgLines = [];
  for (let i = 1; i < tasks.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const prevCol = (i - 1) % cols;
    const prevRow = Math.floor((i - 1) / cols);

    const x1 = startX + prevCol * (W + GAP_X) + W / 2;
    const y1 = startY + prevRow * (H + GAP_Y) + H;
    const x2 = startX + col * (W + GAP_X) + W / 2;
    const y2 = startY + row * (H + GAP_Y);

    svgLines.push(`
      <path class="dag-edge ${tasks[i-1].status === 'success' ? 'active' : ''}"
            d="M${x1},${y1} C${x1},${y1+30} ${x2},${y2-30} ${x2},${y2}"/>
      <polygon class="dag-arrow" points="${x2-4},${y2-4} ${x2+4},${y2-4} ${x2},${y2+4}"/>
    `);
  }
  svg.innerHTML = svgLines.join('');
}

// ── 渲染：事件流 ─────────────────────────────────────────────
function renderEvents() {
  const el = document.getElementById('eventList');
  if (!events.length) return;

  el.innerHTML = events.slice(-50).reverse().map(e => `
    <div class="event-item ${e.type}">
      <span class="event-time">${formatTime(e.timestamp)}</span>
      <span class="event-type"></span>
      <div class="event-content">
        <span class="event-msg">${escapeHtml(e.msg || e.type)}</span>
      </div>
    </div>
  `).join('');
}

function addEvent(type, msg) {
  events.push({ type, msg, timestamp: new Date().toISOString() });
  if (events.length > 200) events = events.slice(-150);
  renderEvents();
}

// ── UI 更新 ───────────────────────────────────────────────────
function updateStats() {
  animateValue('statNodes', nodes.length);
  animateValue('statOnline', nodes.filter(n => n.status === 'online').length);
  animateValue('statPending', tasks.filter(t => t.status === 'pending' || t.status === 'running').length);
  animateValue('statDone', tasks.filter(t => t.status === 'success' || t.status === 'done').length);
}

function updateClusterStatus(swarm) {
  const dot = document.getElementById('clusterDot');
  const badge = document.getElementById('clusterName');

  if (swarm.mode === 'demo') {
    dot.className = 'cluster-dot demo';
    badge.textContent = 'Demo';
  } else if (swarm.initialized) {
    dot.className = 'cluster-dot';
    badge.textContent = 'Live';
  } else {
    dot.className = 'cluster-dot offline';
    badge.textContent = 'Offline';
  }
}

// ── 任务操作 ─────────────────────────────────────────────────
async function submitTask(e) {
  e.preventDefault();
  const prompt = document.getElementById('taskPrompt').value.trim();
  const type = document.getElementById('taskType').value;
  if (!prompt) return;

  document.getElementById('taskPrompt').value = '';

  try {
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, mode: type }),
    });
    const data = await res.json();
    showToast('info', `任务 ${data.task_id} 已提交`);
  } catch (err) {
    showToast('error', '提交失败: ' + err.message);
  }
}

function focusTask(taskId) {
  const el = document.getElementById(`dag-${taskId}`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.boxShadow = '0 0 24px rgba(59,130,246,0.6)';
    setTimeout(() => el.style.boxShadow = '', 1500);
  }
}

// ── Tab 切换 ─────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(tab === 'tasks' ? '任务' : '事件'));
  });
  document.getElementById('taskList').style.display = tab === 'tasks' ? 'block' : 'none';
  document.getElementById('eventList').style.display = tab === 'events' ? 'block' : 'none';
}

// ── Toast 通知 ───────────────────────────────────────────────
function showToast(type, msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <span class="toast-icon">${type === 'success' ? '✓' : type === 'error' ? '✕' : type === 'warning' ? '!' : 'ℹ'}</span>
    <span class="toast-msg">${escapeHtml(msg)}</span>
    <button class="toast-close" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(16px)';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// ── 工具函数 ─────────────────────────────────────────────────
function formatTime(ts) {
  if (!ts) return '--:--';
  try {
    return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch {
    return '--:--';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function animateValue(id, target) {
  const el = document.getElementById(id);
  const current = parseInt(el.textContent) || 0;
  const diff = target - current;
  if (diff === 0) return;

  const steps = 10;
  const increment = diff / steps;
  let step = 0;

  const animate = () => {
    step++;
    el.textContent = Math.round(current + increment * step);
    if (step < steps) requestAnimationFrame(animate);
    else el.textContent = target;
  };
  requestAnimationFrame(animate);
}

function refreshAll() {
  showToast('info', '正在刷新...');
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'ping' }));
  }
}

function updateTime() {
  document.getElementById('navTime').textContent = new Date().toLocaleTimeString('zh-CN');
}

// ─── 初始化 ─────────────────────────────────────────────────────
connect();
updateTime();
setInterval(updateTime, 1000);
</script>
